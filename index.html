<style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    max-width: 900px;
    color: #111;
  }

  h1 { font-size: 36px; margin-bottom: 5px; }
  h2 { font-size: 14px; color: #666; margin-bottom: 30px; }

  .section { margin-bottom: 15px; }

  .title {
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
  }

  ul {
    list-style: none;
    padding-left: 0;
    margin-top: 5px;
  }

  li {
    margin: 4px 0;
  }

  .row {
    display: flex;
    align-items: center;
    cursor: pointer;
  }

  .arrow {
    width: 20px;
    flex-shrink: 0;
  }

  .text {
    flex: 1;
  }

  .nested {
    display: none;
    margin-left: 20px; /* aligns under text, not arrow */
  }

  .open > .nested {
    display: block;
  }

  /* Depth styling */
  .depth-1 { font-size: 18px; font-weight: 600; }
  .depth-2 { font-size: 16px; color: #222; }
  .depth-3 { font-size: 14px; color: #444; }
  .depth-4 { font-size: 13px; color: #666; }
</style>
