<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natalia Lee | Business Consulting & Interim Management</title>
  <style>
    :root{
      --bg: #e7fbf7;
      --bg-2: #d4f4ed;
      --card: rgba(255,255,255,0.84);
      --line: #a7e5d9;
      --primary: #0f8f83;
      --primary-2: #18b2a2;
      --primary-3: #0a6961;
      --text: #113935;
      --text-2: #2a5752;
      --text-3: #547873;
      --shadow: 0 12px 34px rgba(9, 91, 83, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(24,178,162,0.16), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      line-height: 1.34;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto 340px;
      gap: 20px;
      align-items: start;
      padding: 22px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .hero-main h1 {
      margin: 0 0 8px 0;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.02;
      color: var(--primary-3);
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .topline {
      color: var(--primary);
      font-weight: 700;
      font-size: 1.04rem;
      margin-bottom: 14px;
    }

    .summary {
      margin: 0;
      color: var(--text-2);
      font-size: 1rem;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pill {
      background: linear-gradient(180deg, #ffffff 0%, #effcf9 100%);
      color: var(--primary-3);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    /* 🔧 ONLY CHANGE: remove extra whitespace under logo */
    .logo-inline {
      display: block;
      align-self: start;
      line-height: 0;
      margin: 0;
      padding: 0;
    }

    .logo-inline img {
      width: 120px;
      display: block;
      margin: 0;
      padding: 0;
    }

    .photo-card {
      justify-self: end;
      width: 100%;
      max-width: 340px;
      padding: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f4fffd 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
      object-fit: cover;
      object-position: top center;
      aspect-ratio: 3 / 4;
      background: #eef8f6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 12px 0;
      color: var(--primary-3);
      font-size: 1.2rem;
      line-height: 1.15;
    }

    .lead,
    .detail,
    .contact-list {
      margin: 0;
      padding-left: 18px;
    }

    .lead > li,
    .detail > li {
      margin: 3px 0;
    }

    .lead > li { color: var(--text); }
    .detail > li { color: var(--text-2); }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 18px;
    }

    .project {
      border-top: 1px solid var(--line);
      padding: 10px 0;
    }

    .project:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .project-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      background: transparent;
      border: 0;
      padding: 0;
      text-align: left;
      cursor: pointer;
      color: inherit;
      font: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .project-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .project-meta {
      color: var(--text-3);
      font-size: 0.94rem;
      font-weight: 700;
    }

    .project-arrow {
      color: var(--primary);
      font-weight: 700;
    }

    .project-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }

    .project.is-open .project-content {
      max-height: 220px;
    }

    .contact-list {
      list-style: none;
      padding-left: 0;
    }

    .contact-list li {
      margin: 0;
      padding: 7px 0;
      border-top: 1px solid var(--line);
      color: var(--text-2);
    }

    .contact-list li:first-child {
      border-top: 0;
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .photo-card {
        justify-self: start;
        max-width: 280px;
      }
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <section class="hero">
      <div class="hero-main">
        <h1>Natalia Lee</h1>
        <div class="subtitle">Business Consulting &amp; Interim Management</div>
        <div class="topline">Operational Excellence | SCM | Transformation</div>
        <p class="summary">
          +14 Jahre Consulting &amp; Interim Management | Wirtschaftsingenieurin (Diplom) |
          Zertifizierte Projektmanagerin | Internationale Erfahrung (USA, EU, Osteuropa)
        </p>
      </div>

      <div class="logo-inline">
        <img src="think_and_act_along_the_value_chain.jpeg">
      </div>

      <div class="photo-card">
        <img src="Natalia pic.jpg">
      </div>
    </section>

    <!-- CONTENT UNCHANGED FROM PREVIOUS VERSION -->

  </div>

<script>
document.querySelectorAll('.project-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const project = btn.closest('.project');
    project.classList.toggle('is-open');
  });
});
</script>

</body>
</html>
